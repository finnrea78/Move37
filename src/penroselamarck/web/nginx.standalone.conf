server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Standalone debug mode: web runs without API dependency.
  location = /health {
    default_type application/json;
    return 200 '{"status":"ok","mode":"standalone-web"}';
  }

  location /v1/ {
    default_type application/json;
    return 200 '{"status":"standalone","message":"API disabled by WEB_STANDALONE_DEBUG"}';
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    try_files $uri /index.html;
  }
}
