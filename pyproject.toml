[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = [
    "docs/sphinx/build",
    "src/penroselamarck/alembic/versions",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "A",   # flake8-builtins
    "C90", # mccabe complexity
]
ignore = [
    "E203", # whitespace before ':' (compat with formatter)
]

[tool.ruff.lint.isort]
known-first-party = ["penroselamarck"]
combine-as-imports = true

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
preview = true
