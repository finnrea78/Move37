web_search = "cached"
model_reasoning_effort = "high"
personality = "pragmatic"
mcp_oauth_callback_port = 1455
cli_auth_credentials_store = "file"
mcp_oauth_credentials_store = "file"

[shell_environment_policy]
include_only = [
  "PATH",
  "HOME",
  "LANG",
  "LC_ALL",
  "SSH_AUTH_SOCK",
  "SSH_AGENT_PID",
  "GIT_SSH_COMMAND",
  "GIT_ASKPASS"
]

[features]
shell_snapshot = true

[projects."/home/diogo"]
trust_level = "trusted"

[mcp_servers.penroselamarck-local]
url = "http://localhost:8080/v1/mcp/sse"
