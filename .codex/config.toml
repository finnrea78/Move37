web_search = "cached"
model_reasoning_effort = "high"
personality = "pragmatic"
mcp_oauth_callback_port = 1455

[shell_environment_policy]
include_only = [
  "PATH",
  "HOME",
  "LANG",
  "LC_ALL",
  "SSH_AUTH_SOCK",
  "SSH_AGENT_PID",
  "GIT_SSH_COMMAND",
  "GIT_ASKPASS"
]

[features]
shell_snapshot = true

[projects."/home/diogo"]
trust_level = "trusted"

[mcp_servers.penroselamarck]
url = "http://penroselamarck-mcp:8080/v1/mcp/sse"
