version: "3.9"
services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pl-docs
    ports:
      - "8000:8000"
    volumes:
      - ./docs/sphinx/src:/docs/src
      - ./docs/sphinx/build:/docs/build
    command: sphinx-autobuild /docs/src /docs/build/html --host 0.0.0.0 --port 8000
    # Ensure proper file permissions inside container
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
